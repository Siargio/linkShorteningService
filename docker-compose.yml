services:
  # ==========================================================
  # POSTGRESQL
  # ==========================================================
  db:
    image: postgres:16-alpine

    container_name: shortener-postgres
    # Переменные, используемые PostgreSQL
    # для первоначального создания базы.
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Публикуем PostgreSQL на localhost:5432.
    #
    # Это позволяет подключаться к базе:
    #
    #   - из Go-приложения, запущенного локально;
    #   - из DBeaver;
    #   - через psql на компьютере.
    ports:
      - "5433:5432"

    # Данные PostgreSQL хранятся в именованном volume.
    #
    # Поэтому обычный docker compose down
    # не удалит созданные ссылки.
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Проверяем, что PostgreSQL уже готов принимать запросы.
    #
    # Простого состояния "контейнер запущен" недостаточно:
    # процесс PostgreSQL может ещё выполнять инициализацию.
    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
      ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

    # Автоматически перезапускаем базу после сбоя
    # или перезапуска Docker Desktop.
    restart: unless-stopped

  # ==========================================================
  # REDIS
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: shortener-redis

    # Публикуем Redis на localhost:6379,
    # чтобы он был доступен и локально запущенному приложению.
    ports:
      - "6379:6379"

    # Сохраняем данные Redis в отдельном volume.
    volumes:
      - redis_data:/data

    # redis-cli ping должен вернуть PONG.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

    restart: unless-stopped

  # ==========================================================
  # МИГРАЦИИ
  # ==========================================================
  migrate:
    # Используем готовый Docker-образ golang-migrate.
    image: migrate/migrate:v4.19.1

    # Миграция должна запускаться только после того,
    # как PostgreSQL действительно стал healthy.
    depends_on:
      db:
        condition: service_healthy

    # Передаём контейнеру локальную папку migrations.
    #
    # :ro означает read-only:
    # контейнер может читать миграции, но не может их изменять.
    volumes:
      - ./migrations:/migrations:ro

    # Команда эквивалентна локальному вызову:
    #
    # migrate \
    #   -path migrations \
    #   -database "postgres://..." \
    #   up
    #
    # Внутри Docker-сети PostgreSQL доступен по имени сервиса db,
    # а не через localhost.
    command:
       - "-path=/migrations"
       - "-database=postgres://postgres:postgres@db:5432/shortener?sslmode=disable"
       - "up"

    # Миграция является одноразовой задачей:
    #
    #   - выполняет SQL;
    #   - завершается с кодом 0;
    #   - не должна постоянно перезапускаться.
    restart: "no"

  # ==========================================================
  # GO-ПРИЛОЖЕНИЕ
  # ==========================================================
  app:
    # Собираем приложение из Dockerfile в текущей директории.
    build:
      context: .
      dockerfile: Dockerfile

    # Переменные окружения приложения.
    #
    # Обрати внимание:
    #
    #   db:5432       — адрес PostgreSQL внутри Docker-сети;
    #   redis:6379    — адрес Redis внутри Docker-сети;
    #   localhost     — не используется для связи контейнеров.
    environment:
      HTTP_PORT: "8080"

      # Это внешний URL, который получит пользователь.
      #
      # Несмотря на то что приложение находится в контейнере,
      # пользователь открывает сервис через localhost компьютера.
      BASE_URL: "http://localhost:8080"

      DATABASE_URL: "postgres://postgres:postgres@db:5432/shortener?sslmode=disable"

      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_TTL: "24h"

      # Внутренний Kafka listener.
      # Приложение работает в Docker-контейнере,
      # поэтому оно подключается к Kafka по имени сервиса kafka.
      #
      # Здесь нельзя использовать localhost:29092:
      # localhost внутри app означает сам контейнер app.
      KAFKA_BROKERS: "kafka:19092"

      # Топик, в который приложение публикует события:
      # link.created
      # link.visited
      KAFKA_TOPIC: "link-events"

      # Стандартизируем время внутри приложения.
      TZ: "UTC"

    # Публикуем порт приложения:
    #
    # localhost:8080 → app:8080
    ports:
      - "8080:8080"

    # Порядок запуска.
    depends_on:
      # PostgreSQL должен быть полностью готов.
      db:
        condition: service_healthy

      # Приложение стартует только после успешного
      # завершения всех миграций.
      migrate:
        condition: service_completed_successfully

      # Redis является необязательным кешем.
      #
      # Достаточно дождаться запуска контейнера.
      # Если Redis ещё не готов или временно недоступен,
      # приложение запустится и будет работать через PostgreSQL.
      redis:
        condition: service_started

      # kafka-init создаёт топик link-events и завершается с кодом 0.
      #
      # Только после успешного создания топика
      # запускается Go-приложение.
      kafka-init:
        condition: service_completed_successfully

    restart: unless-stopped

  # ==========================================================
  # ПОДГОТОВКА KAFKA VOLUME
  # ==========================================================
  kafka-permissions:
    # Маленький Linux-образ нужен только для настройки
    # прав на Kafka volume.
    image: busybox:1.36

    # Этот контейнер должен иметь возможность менять
    # владельца файлов, поэтому запускаем его от root.
    user: "0:0"

    # Подключаем тот же volume, который затем использует Kafka.
    volumes:
      - kafka_data:/var/lib/kafka/data

    # Kafka внутри официального образа запускается
    # пользователем appuser с UID/GID 1000.
    #
    # Поэтому перед запуском Kafka назначаем
    # каталог данных этому пользователю.
    command:
      - "sh"
      - "-c"
      - "chown -R 1000:1000 /var/lib/kafka/data"

    # Это одноразовая задача:
    # выполнила chown и завершилась с кодом 0.
    restart: "no"

  # ==========================================================
  # KAFKA
  # ==========================================================
  kafka:
    image: apache/kafka:4.3.1
    hostname: kafka
    container_name: shortener-kafka

    # С Mac Kafka будет доступна по localhost:29092.
    #
    # Внутри Docker-сети приложение использует kafka:19092.
    ports:
      - "29092:9092"

    environment:
      # Один Kafka node одновременно выполняет роли
      # broker и controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      # Описываем три listener:
      #
      # CONTROLLER     — служебный KRaft listener;
      # PLAINTEXT      — доступ внутри Docker;
      # PLAINTEXT_HOST — доступ с Mac.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"

      # Адреса, которые Kafka сообщает клиентам.
      #
      # Go в Docker получит kafka:19092.
      # Локальный Go получит localhost:29092.
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:29092,PLAINTEXT://kafka:19092"

      # Реальные порты, которые слушает Kafka.
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"

      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Для single-node quorum состоит из одного controller.
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"

      # Постоянный идентификатор KRaft-кластера.
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"

      # В single-node окружении replication factor равен 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1

      # В этом каталоге Kafka хранит:
      #
      #   - метаданные KRaft;
      #   - журналы топиков;
      #   - партиции;
      #   - offsets.
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"

    volumes:
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:19092 >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

    restart: unless-stopped

  # ==========================================================
  # СОЗДАНИЕ KAFKA TOPIC
  # ==========================================================
  kafka-init:
    image: apache/kafka:4.3.1

    depends_on:
      kafka:
        condition: service_healthy

    # Переопределяем entrypoint:
    # контейнер должен только создать topic и завершиться.
    entrypoint:
      - "/opt/kafka/bin/kafka-topics.sh"

    command:
      - "--bootstrap-server"
      - "kafka:19092"
      - "--create"
      - "--if-not-exists"
      - "--topic"
      - "link-events"
      - "--partitions"
      - "3"
      - "--replication-factor"
      - "1"

    restart: "no"

# ============================================================
# ПОСТОЯННЫЕ ДАННЫЕ
# ============================================================
volumes:
  # Данные PostgreSQL.
  postgres_data:

  # Данные Redis.
  redis_data:

  # Данные Kafka.
  kafka_data: