version: "2"

sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "sql/queries"
    gen:
      go:
        package: "db"
        out: "internal/repository/db"
        sql_package: "pgx/v5"
        # Добавляем JSON-теги в сгенерированные структуры.
        emit_json_tags: true
        # Генерируем интерфейс Querier.
        # Он используется в PostgresLinkRepository.
        emit_interface: true
        emit_empty_slices: true
        overrides:
          # Для колонки links.created_at всегда используем time.Time.
          #
          # Используем override конкретной колонки,
          # чтобы результат не зависел от nullable/non-nullable определения.
          - column: "links.created_at"
            go_type:
              import: "time"
              type: "Time"